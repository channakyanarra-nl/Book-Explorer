services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
