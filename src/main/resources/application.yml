spring:
  application:
    name: BookExplorer

  datasource:
    url: jdbc:postgresql://localhost:5432/bookexplorer
    username: "myuser"
    password: "secret"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  graphql:
    graphiql:
      enabled: true

server:
  port: 8080